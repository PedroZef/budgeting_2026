spring.application.name=budgeting

server.port=8080

spring.profiles.active=local
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.audio.transcription.enabled=true
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.audio.transcription.base-url=https://api.groq.com/openai/v1
spring.ai.openai.audio.transcription.options.model=whisper-large-v3
spring.ai.retry.max-attempts=1

# Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/budget_ia_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mf459@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA e Flyway
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
